name: iOS build and submit

# Builds the iOS app on a macOS runner with `eas build --local` (does NOT use
# EAS cloud build quota) and submits to App Store Connect / TestFlight.
# Public repo -> GitHub-hosted macOS runners are free.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Restore Expo auth
        run: |
          mkdir -p ~/.expo
          echo "${{ secrets.EXPO_STATE_B64 }}" | base64 --decode > ~/.expo/state.json

      - name: Restore App Store Connect API key
        run: |
          mkdir -p asc
          echo "${{ secrets.ASC_KEY_B64 }}" | base64 --decode > asc/AuthKey.p8

      - name: Build iOS (local, no EAS quota)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile production --local --non-interactive --output ./app.ipa

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas submit --platform ios --profile ci --path ./app.ipa --non-interactive

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poker-edge-ipa
          path: ./app.ipa
          if-no-files-found: ignore
