 .card{background:#1E2D45;border:2px solid #2A3B57;border-radius:38px;padding:42px;margin-bottom:26px}
 .card.acc{border-color:#5B8DEF;box-shadow:0 0 50px #5B8DEF33}
 .row{display:flex;justify-content:space-between;align-items:center}
 .pill{border:2px solid;border-radius:999px;padding:7px 20px;font-size:27px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:inline-block}
 .muted{color:#9DB0CC;font-size:34px}
 .mono{font-family:'Bebas Neue';letter-spacing:1px}
 .big{font-family:'Bebas Neue';letter-spacing:1px}
 .stat{flex:1}
 .stat .v{font-family:'Bebas Neue';font-size:66px}
 .stat .l{color:#9DB0CC;font-size:25px;text-transform:uppercase;letter-spacing:1px}
 .btn{background:#5B8DEF;color:#0B1120;border-radius:26px;padding:28px;text-align:center;font-weight:800;font-size:38px}
 .chip{display:inline-block;border:2px solid #2A3B57;background:#16223A;color:#9DB0CC;border-radius:999px;padding:12px 26px;font-size:30px;font-weight:600;margin:0 12px 12px 0}
 .chip.on{background:#5B8DEF;color:#0B1120;border-color:#5B8DEF}
 .grid{display:grid;grid-template-columns:repeat(13,1fr);gap:5px}
 .grid div{aspect-ratio:1;border-radius:6px;background:#16223A;display:flex;align-items:center;justify-content:center;font-size:15px;color:#6B7894}
 .grid div.on{background:#5B8DEF;color:#0B1120;font-weight:700}
 .bar{height:30px;border-radius:12px;background:#E2574C;overflow:hidden;position:relative}
 .bar>div{position:absolute;left:0;top:0;bottom:0;background:#3FB477}
 .dots{position:absolute;left:0;right:0;bottom:64px;display:flex;justify-content:center;gap:16px}
 .dots span{width:18px;height:18px;border-radius:50%;background:#2A3B57}
 .dots span.on{background:#5B8DEF;width:54px;border-radius:9px}
 .glass{background:rgba(255,255,255,.05);border:2px solid #5B8DEF55;border-radius:30px;padding:34px}
