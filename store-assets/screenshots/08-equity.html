<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
 *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
 html,body{width:1290px;height:2796px;overflow:hidden}
 body{font-family:'Barlow',sans-serif;color:#F6F8FC;
   background:
     radial-gradient(130% 85% at 50% -12%, #3FB4773D, transparent 58%),
     radial-gradient(120% 70% at 50% 118%, #3FB47726, transparent 55%),
     linear-gradient(165deg,#0B1120,#0E1A33 52%,#0A0F1C);}
 .wrap{position:relative;height:100%;padding:130px 96px 0;text-align:center}
 .eyebrow{font-family:'Barlow';font-weight:700;font-size:34px;letter-spacing:6px;text-transform:uppercase;color:#3FB477}
 h1{font-family:'Bebas Neue';font-size:128px;line-height:.96;letter-spacing:1.5px;margin-top:20px;text-shadow:0 6px 40px #3FB47755}
 h1 b{color:#3FB477;font-weight:400}
 .sub{font-size:40px;font-weight:500;color:#9DB0CC;margin-top:26px}
 .glow{position:absolute;left:50%;top:1030px;transform:translateX(-50%);width:1100px;height:1100px;border-radius:50%;
   background:radial-gradient(circle, #3FB47755, transparent 62%);filter:blur(30px)}
 .phone{position:absolute;left:50%;top:760px;transform:translateX(-50%);width:880px;height:1880px;
   background:#0B1120;border:13px solid #0a1426;border-radius:82px;
   box-shadow:0 50px 130px rgba(0,0,0,.65), 0 0 0 3px #2A3B57, 0 0 120px #3FB47740;
   padding:54px 46px;overflow:hidden}
 .island{width:280px;height:34px;background:#05media;background:#060b16;border-radius:20px;margin:6px auto 30px}
 .nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
 .nav .t{font-family:'Bebas Neue';font-size:62px;letter-spacing:1.5px}
 .card{background:#1E2D45;border:2px solid #2A3B57;border-radius:38px;padding:42px;margin-bottom:26px}
 .card.acc{border-color:#3FB477;box-shadow:0 0 50px #3FB47733}
 .row{display:flex;justify-content:space-between;align-items:center}
 .pill{border:2px solid;border-radius:999px;padding:7px 20px;font-size:27px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:inline-block}
 .muted{color:#9DB0CC;font-size:34px}
 .mono{font-family:'Bebas Neue';letter-spacing:1px}
 .big{font-family:'Bebas Neue';letter-spacing:1px}
 .stat{flex:1}
 .stat .v{font-family:'Bebas Neue';font-size:66px}
 .stat .l{color:#9DB0CC;font-size:25px;text-transform:uppercase;letter-spacing:1px}
 .btn{background:#3FB477;color:#0B1120;border-radius:26px;padding:28px;text-align:center;font-weight:800;font-size:38px}
 .chip{display:inline-block;border:2px solid #2A3B57;background:#16223A;color:#9DB0CC;border-radius:999px;padding:12px 26px;font-size:30px;font-weight:600;margin:0 12px 12px 0}
 .chip.on{background:#3FB477;color:#0B1120;border-color:#3FB477}
 .grid{display:grid;grid-template-columns:repeat(13,1fr);gap:5px}
 .grid div{aspect-ratio:1;border-radius:6px;background:#16223A;display:flex;align-items:center;justify-content:center;font-size:15px;color:#6B7894}
 .grid div.on{background:#3FB477;color:#0B1120;font-weight:700}
 .bar{height:30px;border-radius:12px;background:#E2574C;overflow:hidden;position:relative}
 .bar>div{position:absolute;left:0;top:0;bottom:0;background:#3FB477}
 .dots{position:absolute;left:0;right:0;bottom:64px;display:flex;justify-content:center;gap:16px}
 .dots span{width:18px;height:18px;border-radius:50%;background:#2A3B57}
 .dots span.on{background:#3FB477;width:54px;border-radius:9px}
 .glass{background:rgba(255,255,255,.05);border:2px solid #3FB47755;border-radius:30px;padding:34px}
</style></head><body>
 <div class="wrap">
  <div class="eyebrow">Local, instant</div>
  <h1>EQUITY +<br><b>GTO SPOTS</b></h1>
  <div class="sub">Hand vs range, plus flop strategy.</div>
 </div>
 <div class="glow"></div>
 <div class="phone"><div class="island"></div><div class="nav"><div class="t">Equity</div></div>
      <div class="card acc"><div class="row"><span class="big" style="font-size:50px">A&#9829;K&#9829; vs Q&#9824;Q&#9830;</span><span class="big" style="font-size:72px;color:#3FB477">46%</span></div>
      <div class="bar" style="margin-top:20px"><div style="width:46%"></div></div>
      <div class="muted" style="margin-top:16px">12,000 simulations</div></div>
      <div class="card"><div class="big" style="font-size:42px;color:#3FB477">Flop strategy</div><div class="muted" style="margin:12px 0">A&#9829; 7&#9827; 2&#9830; - dry high</div><div class="row"><div class="stat"><div class="v">78%</div><div class="l">C-bet</div></div><div class="stat"><div class="v">33%</div><div class="l">Sizing</div></div></div></div></div>
 <div class="dots"><span class=""></span><span class=""></span><span class=""></span><span class=""></span><span class=""></span><span class=""></span><span class=""></span><span class="on"></span><span class=""></span><span class=""></span></div>
</body></html>
